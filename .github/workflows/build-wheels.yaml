name: Build and publish wheels

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload artifact destination (0=none, 1=testpypi, 2=pypi)"
        required: false
        default: '0'
        type: choice
        options: ['0', '1', '2']
  pull_request:
    paths:
      - '.github/workflows/build-wheels.yaml'
      - 'ci/**'
      - 'crates/python/pyproject.toml'
      - 'crates/python/Cargo.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GDAL_VERSION: 3.12.1

jobs:

  build_wheels:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }} wheel
    runs-on: ${{ matrix.os }}
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'pourpoint-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            arch: arm64
            cibw_build: cp39-macosx_arm64
          - os: macos-15-intel
            platform: macos
            arch: x86_64
            cibw_build: cp39-macosx_x86_64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            cibw_build: cp39-manylinux_x86_64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            cibw_build: cp39-manylinux_aarch64
          - os: windows-2025
            platform: windows
            arch: amd64
            cibw_build: cp39-win_amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          # The vendored fixture contains Windows-reserved `aux`, breaking Git checkout
          # on Windows runners. Wheel builds never read test fixtures; CIBW only imports
          # the installed wheel and checks bundled data.
          sparse-checkout: |
            /*
            !/crates/core/tests/fixtures/parity/tiny-with-aux-d8-projected-grass/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Host Rust is used by the macOS and Windows legs; the Linux build runs
      # inside the manylinux container, which installs its own Rust via rustup
      # in CIBW_BEFORE_ALL_LINUX. On Windows the default host triple is
      # x86_64-pc-windows-msvc — the MSVC ABI required by the conda-forge GDAL
      # import library.
      - name: Install Rust toolchain
        if: runner.os == 'macOS' || runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: crates/python
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "${{ matrix.cibw_build }}"
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          # cibuildwheel expects "AMD64" (platform.machine() casing); the
          # matrix arch stays lowercase "amd64" for artifact naming. There is
          # only one Windows leg, so this is a constant.
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ENVIRONMENT_MACOS: >-
            CMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
            MACOSX_DEPLOYMENT_TARGET=11.0
            BUILD_PREFIX=${GITHUB_WORKSPACE}/pourpoint_libs
            GDAL_HOME=${GITHUB_WORKSPACE}/pourpoint_libs
            GDAL_INCLUDE_DIR=${GITHUB_WORKSPACE}/pourpoint_libs/include
            GDAL_LIB_DIR=${GITHUB_WORKSPACE}/pourpoint_libs/lib
            GDAL_VERSION=${{ env.GDAL_VERSION }}
            PROJ_DATA=${GITHUB_WORKSPACE}/pourpoint_libs/share/proj
            PKG_CONFIG_PATH=${GITHUB_WORKSPACE}/pourpoint_libs/lib/pkgconfig
            LDFLAGS=-Wl,-rpath,${GITHUB_WORKSPACE}/pourpoint_libs/lib
            LIBCLANG_PATH=/Library/Developer/CommandLineTools/usr/lib
          # Container paths: the project is copied to /project inside the
          # manylinux container; host env (incl. GITHUB_WORKSPACE) does not
          # exist in there. No LDFLAGS rpath — auditwheel sets ELF rpaths at
          # repair time. LD_LIBRARY_PATH lets curl's configure, the maturin
          # link step, and auditwheel resolve the freshly built stack.
          CIBW_ENVIRONMENT_LINUX: >-
            BUILD_PREFIX=/project/pourpoint_libs
            GDAL_HOME=/project/pourpoint_libs
            GDAL_INCLUDE_DIR=/project/pourpoint_libs/include
            GDAL_LIB_DIR=/project/pourpoint_libs/lib
            GDAL_VERSION=${{ env.GDAL_VERSION }}
            PROJ_DATA=/project/pourpoint_libs/share/proj
            PKG_CONFIG_PATH=/project/pourpoint_libs/lib/pkgconfig
            LD_LIBRARY_PATH=/project/pourpoint_libs/lib
            LIBCLANG_PATH=/usr/lib64
            PATH=$HOME/.cargo/bin:$PATH
          # Windows: prebuilt GDAL stack from conda-forge (libgdal-core pinned
          # to the same GDAL_VERSION the other legs build from source),
          # installed to C:\gdal by CIBW_BEFORE_ALL_WINDOWS. CIBW_ENVIRONMENT
          # is parsed with bash syntax even on Windows, hence the single
          # quotes; forward slashes are accepted by Rust, clang, and the MSVC
          # linker alike. gdal-sys resolves the import library from
          # GDAL_LIB_DIR; bindgen gets libclang from the runner image's LLVM.
          CIBW_ENVIRONMENT_WINDOWS: >-
            BUILD_PREFIX='C:/gdal/Library'
            GDAL_HOME='C:/gdal/Library'
            GDAL_INCLUDE_DIR='C:/gdal/Library/include'
            GDAL_LIB_DIR='C:/gdal/Library/lib'
            GDAL_VERSION=${{ env.GDAL_VERSION }}
            LIBCLANG_PATH='C:/Program Files/LLVM/bin'
          CIBW_BEFORE_ALL_MACOS: |
            brew remove -f --ignore-dependencies liblerc webp zstd libtiff libxcb libxdcmp lcms2 xmlto ghostscript lz4 openjpeg jpeg-turbo libpng xz giflib rtmpdump brotli snappy libavif libzip
            HOMEBREW_NO_AUTO_UPDATE=1 brew install autoconf automake libtool coreutils cmake wget
            bash ./ci/config.sh
          # Runs inside the manylinux_2_28 (AlmaLinux 8) container as root,
          # cwd=/project. dnf, never apt. clang-devel provides libclang for
          # the gdal crate's bindgen; perl-IPC-Cmd is required by OpenSSL 3's
          # Configure; bzip2 unpacks the GEOS tarball. The manylinux image
          # ships no Rust: install rustup (pattern from cibuildwheel's FAQ).
          CIBW_BEFORE_ALL_LINUX: |
            set -euo pipefail
            dnf install -y wget bzip2 cmake perl perl-IPC-Cmd clang-devel
            curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            bash ./ci/config.sh
          # Runs under cmd.exe (cibuildwheel uses shell=True, i.e. cmd, on
          # Windows), folded to a single &&-chained line. Miniconda is
          # preinstalled on the runner image at C:\Miniconda (not on PATH).
          # conda-forge ships the GDAL import library as gdal.lib (GDAL >=3.5
          # CMake naming) but gdal-sys 0.12 looks for gdal_i.lib first, so a
          # shim copy puts it where the build script's deterministic branch
          # finds it. The trailing dir fails loudly (and shows what exists)
          # if no import library materialized.
          CIBW_BEFORE_ALL_WINDOWS: >-
            C:\Miniconda\Scripts\conda.exe create --yes --prefix C:\gdal
            --override-channels --channel conda-forge
            libgdal-core=${{ env.GDAL_VERSION }} &&
            (if not exist C:\gdal\Library\lib\gdal_i.lib copy /Y
            C:\gdal\Library\lib\gdal.lib C:\gdal\Library\lib\gdal_i.lib) &&
            dir C:\gdal\Library\lib\gdal*.lib
          CIBW_BEFORE_BUILD_MACOS: |
            export DYLD_LIBRARY_PATH=${BUILD_PREFIX}/lib:$DYLD_LIBRARY_PATH
            bash ./ci/copy_gdal_data.sh
            bash ./ci/delocate_preflight.sh
          # delocate_preflight.sh is Mach-O-only and deliberately not run here.
          CIBW_BEFORE_BUILD_LINUX: |
            bash ./ci/copy_gdal_data.sh
          # cibuildwheel v3.4.1 ships no default Windows repair command and
          # does not install delvewheel itself; the documented pattern is a
          # pip install in before-build. copy_gdal_data.sh is OS-agnostic
          # bash; the runner's Git Bash is invoked by absolute path so the
          # hook does not depend on bash being on cmd's PATH.
          CIBW_BEFORE_BUILD_WINDOWS: >-
            pip install delvewheel &&
            "C:\Program Files\Git\bin\bash.exe" ./ci/copy_gdal_data.sh
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            export DYLD_LIBRARY_PATH=${GITHUB_WORKSPACE}/pourpoint_libs/lib:$DYLD_LIBRARY_PATH &&
            delocate-listdeps --depending --all {wheel} &&
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
          # cibuildwheel's Linux default command, made explicit, with the
          # built stack on LD_LIBRARY_PATH so the vendored GDAL/GEOS/PROJ
          # chain resolves while auditwheel grafts it into the wheel. This is
          # the single repair pass; maturin's own auditwheel stays "skip" in
          # pyproject.toml so the wheel is never repaired twice.
          # --strip: the from-source GDAL/GEOS/PROJ stack is compiled with -g
          # (ci/config.sh linux CFLAGS/CXXFLAGS), and on ELF the DWARF debug
          # info stays in the linked .so. Unstripped, the grafted libs pushed
          # the manylinux wheels to ~169 MB, over PyPI's 100 MB per-file
          # limit; --strip runs binutils strip on them inside the
          # (native-arch) manylinux container so the debug sections are gone.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            LD_LIBRARY_PATH=/project/pourpoint_libs/lib
            auditwheel repair --strip -w {dest_dir} {wheel}
          # delvewheel vendors gdal.dll and its transitive conda-forge DLLs
          # (proj, geos, sqlite, curl, openssl, ...) into the wheel;
          # --add-path points it at the conda env's DLL directory. The MSVC
          # runtime is intentionally not vendored (standard wheel practice;
          # CPython itself installs it).
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >-
            delvewheel repair --add-path C:\gdal\Library\bin -w {dest_dir} {wheel}
          CIBW_TEST_COMMAND: |
            python -c "
            import pourpoint
            from pathlib import Path
            pkg = Path(pourpoint.__file__).parent
            assert (pkg / '_data' / 'gdal' / 'gdalvrt.xsd').is_file(), 'missing bundled gdal_data'
            assert (pkg / '_data' / 'proj' / 'proj.db').is_file(), 'missing bundled proj.db'
            assert pourpoint.__version__, 'missing __version__'
            try:
                pourpoint.Engine('/nonexistent/path/to/dataset')
            except pourpoint.DatasetError:
                pass
            else:
                raise AssertionError('Engine should reject missing datasets')
            from pourpoint import _pourpoint
            _pourpoint._self_test_proj()
            print('wheel self-test passed; version=' + pourpoint.__version__)
            "
          # cmd.exe cannot execute the multi-line `python -c` above (newlines
          # inside a quoted argument break cmd parsing), so the identical
          # assertions live in ci/wheel_smoke_test.py. The platform-specific
          # option overrides the generic CIBW_TEST_COMMAND on Windows only;
          # tests still run from cibuildwheel's temp dir against the
          # installed (repaired) wheel.
          CIBW_TEST_COMMAND_WINDOWS: >-
            python "{project}/ci/wheel_smoke_test.py"

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'pourpoint-v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build sdist
        working-directory: crates/python
        run: maturin sdist --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: crates/python/dist/*.tar.gz

  publish_test:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist]
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    if: >-
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'pourpoint-v') && contains(github.event.release.tag_name, 'rc')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.upload == '1')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*"
          merge-multiple: true
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist]
    environment: pypi
    permissions:
      contents: read
      id-token: write
    if: >-
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'pourpoint-v') && !contains(github.event.release.tag_name, 'rc')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.upload == '2')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*"
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
